injectors:
  - id: odom
    type: odom
    input_topic: /odom_raw
    output_topic: /odom
    qos_depth: 10

  - id: scan
    type: scan
    input_topic: /scan_raw
    output_topic: /scan
    qos_depth: 10

  - id: motor_feedback
    type: joint_state
    input_topic: /platform/motors/feedback_raw
    output_topic: /platform/motors/feedback
    qos_depth: 10

  - id: imu
    type: imu
    input_topic: /sensors/imu_raw
    output_topic: /sensors/imu
    qos_depth: 10

faults:
  - id: odom_bias
    injector_id: odom
    active_on_startup: false
    start: 5.0
    duration: 10.0
    config:
      x_bias: 1.0
      y_bias: -0.25

  - id: scan_noise
    injector_id: scan
    active_on_startup: false
    start: 8.0
    duration: 12.0
    config:
      range_noise_stddev: 0.05

  - id: scan_delay
    injector_id: scan
    active_on_startup: false
    config:
      delay_ms: 250

  - id: motor_velocity_bias
    injector_id: motor_feedback
    active_on_startup: false
    start: 12.0
    duration: 8.0
    config:
      velocity_bias: 0.1

  - id: motor_feedback_drop
    injector_id: motor_feedback
    active_on_startup: false
    config:
      drop_probability: 0.25

  - id: odom_noise
    injector_id: odom
    active_on_startup: false
    config:
      x_noise_stddev: 0.05
      y_noise_stddev: 0.05

  - id: scan_front_blind
    injector_id: scan
    active_on_startup: false
    config:
      sector_min_deg: -20.0
      sector_max_deg: 20.0
      sector_value: inf
  
  - id: odom_yaw_bias
    injector_id: odom
    active_on_startup: false
    config:
      yaw_bias_deg: 10.0

  - id: odom_yaw_noise
    injector_id: odom
    active_on_startup: false
    config:
      yaw_noise_stddev_deg: 2.0

  - id: imu_accel_noise
    injector_id: imu
    active_on_startup: true
    config:
      linear_acceleration_x_noise_stddev: 0.15
      linear_acceleration_y_noise_stddev: 0.15
      linear_acceleration_z_noise_stddev: 0.05

  - id: odom_twist_covariance_inflation
    injector_id: odom
    active_on_startup: false
    config:
      twist_covariance_scale: 10.0
      twist_covariance_floor: 0.05

  - id: odom_pose_covariance_inflation
    injector_id: odom
    active_on_startup: true
    config:
      pose_covariance_scale: 10.0
      pose_covariance_floor: 0.05