# Example scenario that runs several injectors from one node.
#
# This file is useful for rover-level tests where odometry, lidar, motor
# feedback, IMU, services, and TF are all present in the same ROS graph.
injectors:
  - id: odom
    type: odom
    input_topic: /odom_raw
    output_topic: /odom
    qos_depth: 10

  - id: scan
    type: scan
    input_topic: /scan_raw
    output_topic: /scan
    qos_depth: 10

  - id: motor_feedback
    type: joint_state
    input_topic: /platform/motors/feedback_raw
    output_topic: /platform/motors/feedback
    qos_depth: 10

  - id: imu
    type: imu
    input_topic: /sensors/imu_raw
    output_topic: /sensors/imu
    qos_depth: 10

  - id: enable_motors
    type: trigger_service
    proxy_service: /enable_motors
    target_service: /enable_motors_raw

  - id: tf_odom_base
    type: tf
    input_topic: /tf_raw
    output_topic: /tf
    qos_depth: 50

faults:
  # Scheduled odometry position drift.
  - id: odom_position_bias
    injector_id: odom
    active_on_startup: false
    start: 5.0
    duration: 10.0
    config:
      x_bias: 1.0
      y_bias: -0.25

  # Manual odometry noise fault, useful from the RViz panel or service calls.
  - id: odom_position_noise
    injector_id: odom
    active_on_startup: false
    config:
      x_noise_stddev: 0.05
      y_noise_stddev: 0.05

  # Manual odometry yaw error.
  - id: odom_yaw_bias
    injector_id: odom
    start: 5.0
    duration: 10.0
    active_on_startup: false
    config:
      yaw_bias_deg: 10.0

  # Manual odometry covariance inflation.
  - id: odom_covariance_inflation
    injector_id: odom
    active_on_startup: false
    start: 3.0
    duration: 15.0
    config:
      pose_covariance_scale: 10.0
      pose_covariance_floor: 0.05
      twist_covariance_scale: 10.0
      twist_covariance_floor: 0.05

  # Scheduled noisy scan window.
  - id: scan_range_noise
    injector_id: scan
    active_on_startup: false
    start: 8.0
    duration: 12.0
    config:
      range_noise_stddev: 0.05

  # Manual front-sector lidar dropout.
  - id: scan_front_blind
    injector_id: scan
    active_on_startup: false
    config:
      sector_min_deg: -20.0
      sector_max_deg: 20.0
      sector_value: inf

  # Scheduled motor feedback velocity drift.
  - id: motor_velocity_bias
    injector_id: motor_feedback
    active_on_startup: false
    start: 12.0
    duration: 8.0
    config:
      velocity_bias: 0.1

  # Manual motor feedback dropout.
  - id: motor_feedback_dropout
    injector_id: motor_feedback
    active_on_startup: false
    config:
      drop_probability: 0.25

  # Manual IMU acceleration noise.
  - id: imu_linear_acceleration_noise
    injector_id: imu
    active_on_startup: false
    config:
      linear_acceleration_x_noise_stddev: 0.15
      linear_acceleration_y_noise_stddev: 0.15
      linear_acceleration_z_noise_stddev: 0.05

  # Scheduled service failure.
  - id: enable_motors_forced_failure
    injector_id: enable_motors
    active_on_startup: false
    start: 5.0
    duration: 10.0
    config:
      force_failure: true
      failure_message: Injected scheduled service failure

  # Manual service latency.
  - id: enable_motors_delay
    injector_id: enable_motors
    active_on_startup: false
    config:
      delay_ms: 2000

  # Startup TF translation fault.
  - id: tf_translation_bias
    injector_id: tf_odom_base
    active_on_startup: false
    config:
      parent_frame: odom
      child_frame: base_link
      x_bias: 0.25

assertions:
  - id: odom_yaw_bias_activates
    type: fault_event
    fault_id: odom_yaw_bias
    state: active
    within: 6.0

  - id: odom__yawbias_deactivates
    type: fault_event
    fault_id: odom_yaw_bias
    state: inactive
    within: 17.0

  - id: odom_covariance_activates
    type: fault_event
    fault_id: odom_covariance_inflation
    state: active
    within: 4.0

  - id: odom_covariance_deactivates
    type: fault_event
    fault_id: odom_covariance_inflation
    state: inactive
    within: 20.0