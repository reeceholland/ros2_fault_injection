# Example scenario for TF fault injection.
#
# The TF injector proxies tf2_msgs/msg/TFMessage traffic from /tf_raw to /tf.
# Remap the real TF publisher to /tf_raw, then let this injector publish the
# mutated transforms back onto /tf. Each fault must identify the transform it
# targets with parent_frame and child_frame.
injector:
  id: tf_odom_base
  type: tf
  input_topic: /tf_raw
  output_topic: /tf
  qos_depth: 50

faults:
  # Drops every matching odom -> base_link transform while active.
  - id: tf_dropout
    injector_id: tf_odom_base
    active_on_startup: false
    config:
      parent_frame: odom
      child_frame: base_link
      drop_probability: 1.0

  # Delays republishing TF messages by 250 ms while active. The delay applies
  # to the whole TFMessage, not only to the matching transform.
  - id: tf_delay
    injector_id: tf_odom_base
    active_on_startup: false
    config:
      parent_frame: odom
      child_frame: base_link
      delay_ms: 250

  # Adds X, Y, and Z translation offsets in metres to odom -> base_link.
  - id: tf_translation_bias
    injector_id: tf_odom_base
    active_on_startup: true
    config:
      parent_frame: odom
      child_frame: base_link
      x_bias: 0.25
      y_bias: -0.10
      z_bias: 0.05

  # Adds roll, pitch, and yaw orientation offsets in degrees to odom -> base_link.
  - id: tf_rotation_bias
    injector_id: tf_odom_base
    active_on_startup: false
    config:
      parent_frame: odom
      child_frame: base_link
      roll_bias_deg: 5.0
      pitch_bias_deg: 5.0
      yaw_bias_deg: 10.0

  # Demonstrates stacking translation and rotation errors in one fault.
  - id: tf_pose_bias
    injector_id: tf_odom_base
    active_on_startup: false
    config:
      parent_frame: odom
      child_frame: base_link
      x_bias: 0.20
      y_bias: -0.10
      yaw_bias_deg: 15.0
