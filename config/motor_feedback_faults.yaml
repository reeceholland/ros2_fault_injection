# Example scenario for motor feedback fault injection.
#
# The joint_state injector proxies sensor_msgs/msg/JointState. In the rover
# stack this is useful for /platform/motors/feedback.
injector:
  id: motor_feedback
  type: joint_state
  input_topic: /platform/motors/feedback_raw
  output_topic: /platform/motors/feedback
  qos_depth: 10

faults:
  # Drops roughly 25 percent of motor feedback messages while active.
  - id: motor_feedback_dropout
    injector_id: motor_feedback
    active_on_startup: false
    config:
      drop_probability: 0.25

  # Delays motor feedback messages by the configured number of milliseconds.
  - id: motor_feedback_delay
    injector_id: motor_feedback
    active_on_startup: false
    config:
      delay_ms: 250

  # Adds a constant velocity offset to every velocity entry in the JointState.
  - id: motor_velocity_bias
    injector_id: motor_feedback
    active_on_startup: false
    config:
      velocity_bias: 0.1

  # Adds Gaussian velocity noise to every velocity entry in the JointState.
  - id: motor_velocity_noise
    injector_id: motor_feedback
    active_on_startup: false
    config:
      velocity_noise_stddev: 0.05
