injector:
  id: odom
  type: odom
  input_topic: /odom_raw
  output_topic: /odom
  qos_depth: 10

faults:
  - id: odom_bias
    injector_id: odom
    active_on_startup: false
    start: 10.0
    duration: 10.0
    config:
      x_bias: 1.0
      y_bias: -0.25

  - id: odom_drop
    injector_id: odom
    active_on_startup: false
    start: 5.0
    duration: 10.0
    config:
      drop_probability: 0.5

  - id: odom_noise
    injector_id: odom
    active_on_startup: false
    config:
      x_noise_stddev: 0.05
      y_noise_stddev: 0.05

  - id: odom_delay
    injector_id: odom
    active_on_startup: false
    config:
      delay_ms: 250
