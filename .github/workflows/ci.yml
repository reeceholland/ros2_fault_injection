name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jazzy:
    name: ROS 2 Jazzy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/ros2_fault_injection

      - name: Setup ROS
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install dependencies
        run: |
          sudo rosdep init || true
          rosdep update
          rosdep install --from-paths src --ignore-src --rosdistro jazzy --dependency-types buildtool --dependency-types build --dependency-types build_export --dependency-types exec --dependency-types test -r -y

      - name: Build
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --symlink-install --packages-select ros2_fault_injection --event-handlers console_direct+

      - name: Test
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          colcon test --packages-select ros2_fault_injection --event-handlers console_direct+
          colcon test-result --verbose
